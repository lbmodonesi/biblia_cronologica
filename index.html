<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bíblia Cronológica — Roteiro de Leitura</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(170deg,#f5f0e8 0%,#e8e0d0 40%,#d8cfc0 100%);font-family:'Crimson Text',Georgia,serif;color:#2c2416;-webkit-tap-highlight-color:transparent;font-size:16px}
.header{background:linear-gradient(135deg,#2c1810 0%,#4a2c1a 50%,#2c1810 100%);color:#f0e6d4;padding:36px 20px 20px;text-align:center;border-bottom:3px solid #b8860b;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(184,134,11,.15) 0%,transparent 70%);pointer-events:none}
.header *{position:relative}
.hsub{font-family:'Cormorant Garamond',serif;font-size:13px;letter-spacing:4px;text-transform:uppercase;opacity:.7;margin-bottom:6px}
.header h1{font-family:'Cormorant Garamond',serif;font-size:clamp(26px,6vw,38px);font-weight:700;line-height:1.15;letter-spacing:1px}
.hdesc{font-size:15px;opacity:.8;font-style:italic;margin-top:4px}
.tog{display:flex;justify-content:center;margin-top:16px}
.tog button{padding:9px 26px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;letter-spacing:2px;border:2px solid #b8860b;background:transparent;color:#d4c4a0;cursor:pointer;transition:all .25s}
.tog button:first-child{border-radius:6px 0 0 6px}
.tog button:last-child{border-radius:0 6px 6px 0}
.tog button.on{background:#b8860b;color:#1a0f08}
/* MODE TABS */
.mode-tabs{display:flex;justify-content:center;margin-top:14px;gap:0}
.mode-tab{padding:10px 22px;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:1px;border:none;background:rgba(255,255,255,.08);color:rgba(240,230,212,.5);cursor:pointer;transition:all .25s;border-bottom:2px solid transparent}
.mode-tab:first-child{border-radius:6px 0 0 0}
.mode-tab:last-child{border-radius:0 6px 0 0}
.mode-tab.on{color:#f0e6d4;background:rgba(255,255,255,.15);border-bottom:2px solid #e8c84a}
.mode-desc{font-size:13px;opacity:.6;margin-top:6px;font-style:italic;min-height:16px}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px 60px}
.vbox{background:rgba(255,255,255,.6);border-left:4px solid #b8860b;border-radius:0 8px 8px 0;padding:13px 16px;font-size:15px;line-height:1.55;margin-bottom:14px}
.vbox strong{font-family:'Cormorant Garamond',serif;font-size:17px}
.vbox .p2{opacity:.7;font-size:14px}
.vbox em{opacity:.85}
.pi{display:flex;justify-content:space-between;font-size:14px;opacity:.8;margin-bottom:5px}
.pb{height:7px;background:rgba(0,0,0,.1);border-radius:4px;overflow:hidden;margin-bottom:14px}
.pf{height:100%;background:linear-gradient(90deg,#b8860b,#d4a017);border-radius:4px;transition:width .4s}
.testament-label{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:3px;text-transform:uppercase;text-align:center;padding:10px 0 6px;opacity:.5;margin-top:10px}
.sec{margin-bottom:8px}
.sbtn{width:100%;display:flex;align-items:center;gap:14px;padding:16px 16px;cursor:pointer;text-align:left;font-family:'Crimson Text',Georgia,serif;border-radius:8px;border:1px solid rgba(0,0,0,.08);background:rgba(255,255,255,.55);color:#2c2416;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .25s;font-size:inherit}
.sec.open .sbtn{border-radius:8px 8px 0 0;border:none;box-shadow:0 2px 12px rgba(0,0,0,.15)}
.sicon{font-size:24px;flex-shrink:0}
.sinfo{flex:1;min-width:0}
.stitle{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;line-height:1.2}
.sper{font-size:14px;opacity:.7;margin-top:1px}
.sarr{font-size:18px;opacity:.5;transition:transform .25s}
.sec.open .sarr{transform:rotate(180deg)}
.ilist{background:rgba(255,255,255,.75);border-radius:0 0 8px 8px;border:1px solid rgba(0,0,0,.06);overflow:hidden;display:none}
.sec.open .ilist{display:block}
.item{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;cursor:pointer;border-bottom:1px solid rgba(0,0,0,.05);transition:background .2s}
.item:last-child{border-bottom:none}
.item.done{background:rgba(184,134,11,.07)}
.ichk{width:22px;height:22px;flex-shrink:0;border-radius:4px;border:2px solid rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;margin-top:2px;transition:all .2s;color:#fff;font-size:13px;font-weight:700}
.item.done .ichk{background:var(--pc);border-color:var(--pc)}
.iref{font-weight:700;font-size:16px;line-height:1.3}
.item.done .iref{text-decoration:line-through;opacity:.55}
.itop{font-size:14px;opacity:.65;margin-top:1px;font-style:italic;line-height:1.3}
.inum{display:inline-block;background:rgba(0,0,0,.08);border-radius:4px;padding:2px 7px;font-size:12px;font-family:'Cormorant Garamond',serif;font-weight:700;margin-right:6px;min-width:28px;text-align:center}
.item.done .inum{opacity:.5}
.footer{text-align:center;padding:20px 16px 40px;font-size:13px;opacity:.55;font-style:italic;line-height:1.8}
.footer a{color:#6a4a2a;text-decoration:none;border-bottom:1px dotted rgba(0,0,0,.3)}
.footer a:hover{opacity:.8}
.reset-btn{display:block;margin:10px auto 0;padding:8px 18px;font-family:'Cormorant Garamond',serif;font-size:14px;border:1px solid rgba(0,0,0,.15);background:rgba(255,255,255,.5);border-radius:6px;cursor:pointer;opacity:.6;transition:opacity .2s}
.reset-btn:hover{opacity:1}
.find-today{display:block;margin:0 auto 14px;padding:10px 22px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;border:2px solid #b8860b;background:rgba(184,134,11,.1);color:#5a3a10;border-radius:8px;cursor:pointer;transition:all .2s}
.find-today:hover{background:#b8860b;color:#fff}
.hidden{display:none}
/* HAMBURGER */
.hamburger{position:absolute;top:18px;left:16px;width:36px;height:36px;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;cursor:pointer;z-index:100;background:none;border:none;padding:0}
.hamburger span{display:block;width:22px;height:2px;background:#d4c4a0;border-radius:2px;transition:all .3s}
/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:998;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}
/* SIDEBAR */
.sidebar{position:fixed;top:0;left:-100%;width:min(88vw,400px);height:100%;background:linear-gradient(170deg,#f5f0e8 0%,#e8e0d0 40%,#d8cfc0 100%);z-index:999;transition:left .35s ease;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:4px 0 20px rgba(0,0,0,.3)}
.sidebar.show{left:0}
.sb-header{background:linear-gradient(135deg,#2c1810,#4a2c1a);color:#f0e6d4;padding:30px 18px 18px;text-align:center;border-bottom:3px solid #b8860b;position:sticky;top:0;z-index:1}
.sb-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border:none;background:rgba(255,255,255,.1);color:#d4c4a0;font-size:20px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sb-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:700;letter-spacing:1px}
.sb-sub{font-size:14px;opacity:.7;margin-top:4px;font-style:italic}
.sb-tog{display:flex;justify-content:center;margin-top:14px;gap:0}
.sb-tog button{padding:8px 24px;font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;letter-spacing:2px;border:2px solid #b8860b;background:transparent;color:#d4c4a0;cursor:pointer;transition:all .25s}
.sb-tog button:first-child{border-radius:6px 0 0 6px}
.sb-tog button:last-child{border-radius:0 6px 6px 0}
.sb-tog button.on{background:#b8860b;color:#1a0f08}
.sb-content{padding:14px}
.cur-card{background:rgba(255,255,255,.7);border-radius:10px;margin-bottom:12px;overflow:hidden;border:1px solid rgba(0,0,0,.06);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cur-head{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .2s}
.cur-head:hover{background:rgba(184,134,11,.05)}
.cur-icon{font-size:22px;flex-shrink:0}
.cur-ref{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;flex:1;line-height:1.2}
.cur-tag{font-size:11px;background:rgba(184,134,11,.15);color:#6a4a1a;padding:2px 8px;border-radius:10px;font-family:'Cormorant Garamond',serif;font-weight:600;letter-spacing:1px;flex-shrink:0}
.cur-arr{font-size:14px;opacity:.4;transition:transform .25s;flex-shrink:0}
.cur-card.open .cur-arr{transform:rotate(180deg)}
.cur-body{display:none;padding:0 16px 16px;font-size:16px;line-height:1.7}
.cur-card.open .cur-body{display:block}
.cur-body p{margin-bottom:10px}
.cur-body .highlight{background:rgba(184,134,11,.1);border-left:3px solid #b8860b;padding:10px 14px;border-radius:0 6px 6px 0;margin:12px 0;font-style:italic;font-size:15px;line-height:1.6}
.cur-body .source{font-size:13px;opacity:.5;margin-top:6px}
.sb-menu-list{padding:14px}
.sb-menu-item{display:flex;align-items:center;gap:12px;padding:14px 16px;background:rgba(255,255,255,.6);border-radius:10px;margin-bottom:8px;cursor:pointer;border:1px solid rgba(0,0,0,.06);transition:all .2s}
.sb-menu-item:hover{background:rgba(255,255,255,.85);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.sb-menu-item .mi-icon{font-size:26px}
.sb-menu-item .mi-text{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}
.sb-menu-item .mi-desc{font-size:14px;opacity:.6;margin-top:2px}
.sb-back{display:flex;align-items:center;gap:8px;padding:12px 16px;cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:#6a4a2a;border:none;background:none;margin-bottom:4px}
.sb-back:hover{opacity:.7}
/* TIMELINE */
.tl-era{font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center;opacity:.4;margin:20px 0 12px}
/* CONTEXT NOTE */
.ctx-note{padding:12px 16px;font-size:14px;line-height:1.6;color:#5a4a2a;background:rgba(184,134,11,.06);border-bottom:1px solid rgba(0,0,0,.06);font-style:italic}
.ctx-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 16px;background:rgba(0,0,0,.03);border-bottom:1px solid rgba(0,0,0,.05)}
.ctx-bar .ctx-note-inline{font-size:13px;color:#5a4a2a;font-style:italic;flex:1;line-height:1.4}
.sel-all-btn{padding:5px 12px;font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:600;border:1px solid rgba(0,0,0,.12);background:rgba(255,255,255,.7);border-radius:5px;cursor:pointer;opacity:.7;transition:all .2s;white-space:nowrap;flex-shrink:0;margin-left:10px}
.sel-all-btn:hover{opacity:1;background:rgba(184,134,11,.1)}
/* COMPLETION BANNER */
.completion{padding:16px;text-align:center;background:linear-gradient(135deg,rgba(184,134,11,.08),rgba(184,134,11,.15));border-top:2px solid rgba(184,134,11,.2)}
.completion .comp-icon{font-size:28px;margin-bottom:6px}
.completion .comp-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;color:#6a4a1a;margin-bottom:8px}
.completion .comp-verse{font-size:15px;font-style:italic;line-height:1.6;color:#4a3a1a;max-width:500px;margin:0 auto}
.completion .comp-ref{font-size:12px;opacity:.5;margin-top:6px;font-family:'Cormorant Garamond',serif;font-weight:600}
/* EXPORT/IMPORT */
.backup-area{display:flex;gap:8px;justify-content:center;margin:12px auto 0;flex-wrap:wrap}
/* SHARE BUTTON */
.share-float{position:fixed;bottom:16px;right:16px;z-index:99;display:flex;flex-direction:column-reverse;align-items:flex-end;gap:8px}
.share-toggle{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;background:rgba(44,24,16,.6);color:#d4c4a0;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:all .25s}
.share-toggle:hover{background:rgba(44,24,16,.8)}
.share-toggle.open{background:#b8860b;color:#fff;transform:rotate(45deg)}
.share-opts{display:none;flex-direction:column;gap:8px}
.share-opts.show{display:flex}
.share-btn{width:42px;height:42px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 8px rgba(0,0,0,.2);transition:transform .2s,opacity .2s;opacity:0;transform:scale(.5)}
.share-opts.show .share-btn{opacity:1;transform:scale(1)}
.share-btn:hover{transform:scale(1.1)!important}
.share-btn.wpp{background:#25D366;color:#fff;transition-delay:.05s}
.share-btn.copy{background:rgba(184,134,11,.85);color:#fff;transition-delay:.1s}
/* PROPHECY */
.prof-card{background:rgba(255,255,255,.7);border-radius:10px;margin-bottom:12px;overflow:hidden;border:1px solid rgba(0,0,0,.06)}
.prof-head{padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px}
.prof-head:hover{background:rgba(184,134,11,.05)}
.prof-ref{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:700;flex:1;line-height:1.2}
.prof-arr{font-size:14px;opacity:.4;transition:transform .25s;flex-shrink:0}
.prof-card.open .prof-arr{transform:rotate(180deg)}
.prof-body{display:none;padding:0 14px 14px}
.prof-card.open .prof-body{display:block}
.prof-row{display:flex;gap:12px;margin-bottom:12px}
.prof-col{flex:1;padding:12px;border-radius:8px;line-height:1.6;font-size:14px}
.prof-col.at{background:rgba(74,103,65,.08);border-left:3px solid #4a6741}
.prof-col.nt{background:rgba(184,134,11,.08);border-left:3px solid #b8860b}
.prof-col .prof-label{font-family:'Cormorant Garamond',serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;opacity:.5;margin-bottom:6px}
.prof-col .prof-text{font-style:italic;font-size:14px;line-height:1.6}
.prof-col .prof-cite{font-size:12px;opacity:.5;margin-top:6px;font-family:'Cormorant Garamond',serif;font-weight:600}
.prof-note{font-size:13px;opacity:.65;padding:8px 12px;background:rgba(0,0,0,.03);border-radius:6px;line-height:1.5;margin-top:4px}
.backup-btn{padding:8px 16px;font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:600;border:1px solid rgba(0,0,0,.15);background:rgba(255,255,255,.5);border-radius:6px;cursor:pointer;opacity:.7;transition:opacity .2s;display:flex;align-items:center;gap:6px}
.backup-btn:hover{opacity:1}
.backup-modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.5);align-items:center;justify-content:center}
.backup-modal.show{display:flex}
.backup-box{background:#f5f0e8;border-radius:12px;padding:24px;max-width:90vw;width:360px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,.3)}
.backup-box h3{font-family:'Cormorant Garamond',serif;font-size:18px;margin-bottom:12px}
.backup-box textarea{width:100%;height:80px;border:1px solid rgba(0,0,0,.15);border-radius:6px;padding:10px;font-family:monospace;font-size:11px;resize:none;margin:8px 0}
.backup-box button{padding:8px 20px;font-family:'Cormorant Garamond',serif;font-size:14px;font-weight:600;border:2px solid #b8860b;background:#b8860b;color:#fff;border-radius:6px;cursor:pointer;margin:4px}
.backup-box .btn-secondary{background:transparent;color:#5a3a10}
.tl-item{position:relative;padding:0 0 0 32px;margin-bottom:0}
.tl-item::before{content:'';position:absolute;left:10px;top:0;bottom:0;width:2px;background:rgba(184,134,11,.25)}
.tl-item:last-child::before{bottom:50%}
.tl-dot{position:absolute;left:4px;top:16px;width:14px;height:14px;border-radius:50%;border:2px solid #b8860b;background:#f5f0e8;z-index:1}
.tl-item.major .tl-dot{background:#b8860b;width:16px;height:16px;left:3px}
.tl-card{background:rgba(255,255,255,.7);border-radius:8px;padding:12px 14px;margin-bottom:10px;border:1px solid rgba(0,0,0,.06)}
.tl-item.major .tl-card{border-left:3px solid #b8860b;background:rgba(255,255,255,.85)}
.tl-date{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:700;color:#b8860b;letter-spacing:1px}
.tl-name{font-weight:700;font-size:16px;margin-top:2px;line-height:1.3}
.tl-desc{font-size:14px;opacity:.7;margin-top:3px;line-height:1.5;font-style:italic}
.tl-ref{font-size:12px;opacity:.45;margin-top:4px;font-family:'Cormorant Garamond',serif}
</style>
</head>
<body>
<!-- OVERLAY -->
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
<div id="sbView"></div>
</div>
<div class="header">
<button class="hamburger" onclick="toggleSidebar()">
<span></span><span></span><span></span>
</button>
<div class="hsub">Roteiro de Leitura</div>
<h1>Bíblia Cronológica</h1>
<div class="hdesc">Todos os livros — na ordem dos acontecimentos</div>
<div class="tog">
<button class="on" onclick="setV('ARC')">ARC</button>
<button onclick="setV('ARA')">ARA</button>
</div>
<div class="mode-tabs">
<button class="mode-tab on" onclick="setMode('prog')">📖 Progressivo</button>
<button class="mode-tab" onclick="setMode('d365')">📅 Plano Diário</button>
</div>
<div class="mode-desc" id="modeDesc">Leitura livre no seu ritmo — marque conforme avança</div>
</div>
<div class="wrap">
<div class="vbox" id="vb"></div>
<div class="pi"><span>Progresso</span><span id="pt"></span></div>
<div class="pb"><div class="pf" id="pf"></div></div>
<div id="todayBtn" class="hidden"><button class="find-today" onclick="goToday()">📖 Ir para o dia de hoje</button></div>
<div id="main"></div>
<div class="backup-area">
<button class="backup-btn" onclick="exportProgress()">📤 Exportar progresso</button>
<button class="backup-btn" onclick="showImport()">📥 Importar progresso</button>
<button class="backup-btn" onclick="showReset()">🗑️ Zerar progresso</button>
</div>
</div>
<div class="footer" id="ft"></div>

<!-- SHARE -->
<div class="share-float">
<div class="share-opts" id="shareOpts">
<button class="share-btn copy" onclick="copyLink()" title="Copiar link">🔗</button>
<button class="share-btn wpp" onclick="shareWhatsApp()" title="WhatsApp">

</div>
<button class="share-toggle" id="shareToggle" onclick="toggleShare()" title="Compartilhar">↑</button>
</div>

<!-- BACKUP MODAL -->
<div class="backup-modal" id="backupModal">
<div class="backup-box" id="backupBox"></div>
</div>

<script>
// ═══════════════════════════════════════
// CURIOSIDADES APOLOGÉTICAS
// ═══════════════════════════════════════
const CURIOSIDADES = {
AT: [
{ref:"Gênesis 1:1",icon:"🌍",tag:"CRIAÇÃO",title:"\"No princípio\" — o que o hebraico revela",
text:`<p>A palavra hebraica <em>bara</em> (בָּרָא), usada em Gênesis 1:1 na forma Qal, é reservada exclusivamente para a ação criadora de Deus na Bíblia. Na forma Qal (a forma verbal básica), o sujeito de <em>bara</em> é sempre Deus — nunca um ser humano. Isso indica que a criação é um ato exclusivo e soberano de Deus — algo do nada (<em>creatio ex nihilo</em>).</p>
<div class="highlight">Diferente de cosmogonias pagãs, que descrevem deuses moldando matéria pré-existente, o relato bíblico afirma que Deus criou tudo do nada — um conceito único no mundo antigo.</div>`},

{ref:"Gênesis 22:1–14",icon:"🐑",tag:"TIPOLOGIA",title:"Moriah — o monte do sacrifício e do Templo",
text:`<p>Deus ordena que Abraão sacrifique Isaque no Monte Moriah. Abraão diz aos servos: <em>\"Eu e o moço iremos... e voltaremos\"</em> (v.5), e ao filho: <em>\"Deus proverá para si o cordeiro\"</em> (v.8).</p>
<p>O Monte Moriah é identificado em 2 Crônicas 3:1 como o local onde Salomão construiu o Templo — e a tradição situa o Calvário nessa mesma região.</p>
<div class="highlight">Assim como Isaque carregou a lenha monte acima, Cristo carregou a cruz. Mas onde Deus proveu um substituto para Isaque, no Calvário o próprio Filho foi o sacrifício definitivo. Abraão profetizou sem saber: \"Deus proverá para si o cordeiro.\"</div>`},

{ref:"Êxodo 12:1–13",icon:"🩸",tag:"TIPOLOGIA",title:"O cordeiro pascal — sangue que protege",
text:`<p>Na última praga do Egito, Deus instrui cada família a sacrificar um cordeiro sem defeito, aplicar o sangue nos umbrais da porta, e permanecer dentro de casa. O anjo da morte passaria por cima (<em>pesach</em>) das casas marcadas.</p>
<p>O cordeiro não podia ter ossos quebrados (Êx 12:46). Séculos depois, os soldados romanos não quebraram os ossos de Jesus na cruz (Jo 19:36), cumprindo esta tipologia.</p>
<div class="highlight">Paulo escreve claramente: \"Cristo, nossa Páscoa, foi sacrificado por nós\" (1 Co 5:7). Cada detalhe do cordeiro pascal — sem defeito, sangue aplicado, ossos intactos — encontra cumprimento em Cristo.</div>`},

{ref:"Levítico 16",icon:"⚖️",tag:"TIPOLOGIA",title:"Dia da Expiação — dois bodes, um só evangelho",
text:`<p>No Yom Kippur, o sumo sacerdote tomava dois bodes: um era sacrificado como oferta pelo pecado, e sobre o outro ele confessava os pecados do povo antes de enviá-lo ao deserto (o \"bode emissário\", <em>azazel</em>).</p>
<p>Um bode morria pelo pecado; o outro levava os pecados embora. Ambos eram necessários para completar a expiação.</p>
<div class="highlight">Cristo cumpriu ambos os papéis simultaneamente: morreu pelos nossos pecados (como o bode sacrificado) e removeu nossa culpa para sempre (como o bode emissário). \"Tão longe quanto o oriente está do ocidente, assim ele afasta de nós as nossas transgressões\" (Sl 103:12).</div>`},

{ref:"Salmo 22",icon:"✝️",tag:"PROFECIA",title:"Crucificação descrita 1000 anos antes de existir",
text:`<p>Davi escreveu o Salmo 22 por volta de 1000 a.C. A crucificação como método de execução só foi desenvolvida pelos persas séculos depois e popularizada por Roma.</p>
<p>O salmo descreve: mãos e pés traspassados (v.16), ossos desconjuntados (v.14), sede intensa (v.15), divisão das vestes e sorteio da roupa (v.18) — exatamente o que os Evangelhos narram sobre a crucificação de Jesus.</p>
<div class="highlight">As primeiras palavras de Jesus na cruz — \"Deus meu, Deus meu, por que me desamparaste?\" (Mt 27:46) — são a citação direta do versículo 1 deste salmo. Jesus estava apontando para esta profecia no momento exato de seu cumprimento.</div>`},

{ref:"Isaías 53",icon:"📜",tag:"PROFECIA",title:"O Servo Sofredor — 700 anos antes do Calvário",
text:`<p>Isaías 53, escrito aproximadamente 700 a.C., descreve alguém que seria \"desprezado e rejeitado\" (v.3), \"ferido pelas nossas transgressões\" (v.5), levado \"como um cordeiro ao matadouro\" (v.7), morto entre os ímpios mas sepultado com o rico (v.9).</p>
<p>Jesus foi crucificado entre criminosos e sepultado no túmulo de José de Arimateia, um homem rico (Mt 27:57–60).</p>
<div class="highlight">Os manuscritos do Mar Morto, descobertos em 1947, contêm cópias de Isaías datadas de pelo menos 150 a.C. — provando que esta profecia existia séculos antes de Jesus, e não foi escrita depois para se encaixar nos eventos.</div>`},

{ref:"Daniel 9:25–26",icon:"📐",tag:"PROFECIA",title:"As 70 semanas — cronologia que aponta para o Messias",
text:`<p>Daniel recebe uma profecia de \"setenta semanas\" (hebraico: <em>shavuim</em>, períodos de sete anos = 490 anos) contadas a partir do decreto para restaurar Jerusalém.</p>
<p>Após 69 semanas (483 anos), o \"Ungido\" seria \"cortado\" (morto). O decreto de Artaxerxes para Neemias (445 a.C.), contando 483 anos proféticos, leva aproximadamente ao período do ministério e morte de Jesus (por volta de 30–33 d.C.).</p>
<div class="highlight">Esta profecia não apenas prediz a vinda do Messias, mas fornece um cronograma. Após sua morte, Daniel prediz que \"o povo do príncipe que há de vir destruirá a cidade e o santuário\" — exatamente o que os romanos fizeram em 70 d.C.</div>`},

{ref:"Josué 6",icon:"🏚️",tag:"ARQUEOLOGIA",title:"Jericó — muros que caíram para fora",
text:`<p>O relato bíblico afirma que os muros de Jericó \"caíram rente ao chão\" (Js 6:20). Escavações arqueológicas em Tell es-Sultan (Jericó) revelaram que as muralhas de fato colapsaram para fora — algo incomum, pois muros de cidades sitiadas normalmente caem para dentro quando aríetes os derrubam.</p>
<p>Também foram encontradas grandes quantidades de grãos carbonizados, indicando que a cidade foi destruída na época da colheita (consistente com a narrativa, logo após a Páscoa) e que não houve saque prolongado — o texto diz que a cidade foi consagrada ao Senhor.</p>
<div class="highlight">A queda para fora dos muros é consistente com o relato de uma intervenção divina, não de uma técnica militar convencional.</div>`},

{ref:"2 Reis 18–19",icon:"🏛️",tag:"ARQUEOLOGIA",title:"Prisma de Senaqueribe — o cerco que fracassou",
text:`<p>O Prisma de Taylor (c. 691 a.C.), hoje no Museu Britânico, registra a campanha do rei assírio contra Judá. Ele se gaba de ter encurralado Ezequias \"como um pássaro em gaiola\" em Jerusalém.</p>
<p>Curiosamente, o prisma nunca menciona a conquista de Jerusalém — algo que os assírios sempre registravam com detalhes. A Bíblia explica: o anjo do Senhor feriu 185 mil soldados assírios, e Senaqueribe recuou (2 Rs 19:35–36).</p>
<div class="highlight">É notável que um registro assírio, feito para glorificar o rei, confirme indiretamente o relato bíblico: Senaqueribe cercou Jerusalém, mas nunca a conquistou. A omissão é tão eloquente quanto uma confissão.</div>`},

{ref:"Salmo 90",icon:"⏳",tag:"AUTORIA",title:"O salmo mais antigo da Bíblia",
text:`<p>O Salmo 90 é atribuído a Moisés, tornando-o possivelmente o poema mais antigo do Saltério (c. 1400 a.C.). Ele reflete sobre a eternidade de Deus em contraste com a brevidade da vida humana — temas que Moisés vivenciou ao ver uma geração inteira morrer no deserto durante os 40 anos de peregrinação.</p>
<div class="highlight">\"Ensina-nos a contar os nossos dias, para que alcancemos coração sábio\" (v.12). Moisés, que viveu 120 anos e viu uma nação inteira perecer por incredulidade, tinha autoridade singular para escrever sobre a brevidade da vida.</div>`}
],

NT: [
{ref:"João 2:1–11",icon:"🍷",tag:"CONTEXTO",title:"Vasos de pedra — Jesus substitui o sistema de purificação",
text:`<p>Nas bodas de Caná, Jesus ordena que encham de água seis vasos de pedra. O texto faz questão de dizer que eram vasos \"segundo a purificação dos judeus\" (Jo 2:6). Esses vasos eram usados exclusivamente para rituais de lavagem cerimonial prescritos pela tradição rabínica.</p>
<p>Eram de pedra (não barro) porque a lei oral judaica ensinava que vasos de pedra não contraíam impureza ritual. Cada um comportava 80 a 120 litros.</p>
<div class="highlight">O simbolismo é profundo: Jesus toma os recipientes do sistema de purificação cerimonial judaica e os transforma em veículos de celebração e alegria. A água da Lei se torna o vinho do Evangelho. O mestre-sala confirma: o melhor vinho veio por último — a Nova Aliança supera a antiga.</div>`},

{ref:"João 11:1–44",icon:"💀",tag:"CONTEXTO",title:"Lázaro de 4 dias — por que o detalhe importa",
text:`<p>Quando Jesus chega a Betânia, Lázaro já está morto há quatro dias. Marta protesta: \"Senhor, já cheira mal\" (Jo 11:39). O detalhe dos quatro dias não é acidental.</p>
<p>A tradição rabínica (registrada no Genesis Rabbah e Leviticus Rabbah) ensinava que a alma permanecia perto do corpo por três dias, com esperança de retorno. No quarto dia, a decomposição tornava a morte absolutamente irreversível — a alma partia definitivamente.</p>
<div class="highlight">Jesus esperou deliberadamente até o quarto dia. Ele não ressuscitou alguém \"quase morto\" ou em \"morte aparente\". Pela teologia judaica da época, Lázaro estava irrevogavelmente morto. Isso torna a declaração \"Eu sou a ressurreição e a vida\" (v.25) não apenas uma afirmação teológica, mas uma demonstração de poder sobre a morte definitiva.</div>`},

{ref:"Marcos 2:1–12",icon:"⚡",tag:"TEOLOGIA",title:"\"Quem pode perdoar pecados?\" — divindade reconhecida",
text:`<p>Quando Jesus diz ao paralítico \"Filho, perdoados estão os teus pecados\", os escribas reagem imediatamente: \"Por que este assim fala blasfêmias? Quem pode perdoar pecados senão Deus?\" (v.7).</p>
<p>A reação dos escribas mostra que eles entenderam perfeitamente a reivindicação: Jesus estava se colocando no lugar de Deus. Na teologia judaica, somente Deus pode perdoar pecados cometidos contra Ele.</p>
<div class="highlight">Jesus não corrige a lógica deles. Ao contrário, prova sua autoridade curando o paralítico: \"Para que saibais que o Filho do homem tem autoridade na terra para perdoar pecados...\" (v.10). A cura visível valida a autoridade invisível. Os escribas raciocinaram corretamente — apenas erraram ao negar que Jesus era quem alegava ser.</div>`},

{ref:"Mateus 27:51",icon:"⛪",tag:"TEOLOGIA",title:"Véu do Templo rasgado — de cima para baixo",
text:`<p>No momento da morte de Jesus, \"o véu do Templo se rasgou em dois, de alto a baixo\" (Mt 27:51). O véu separava o Santo dos Santos — a presença de Deus — do restante do Templo. Somente o sumo sacerdote podia entrar, uma vez por ano, no Dia da Expiação.</p>
<p>O véu tinha aproximadamente 18 metros de altura e, segundo fontes rabínicas, era espesso como a palma da mão (um tefach, cerca de 8 cm). Era tecido com grande trabalho e exigia considerável esforço para ser manuseado.</p>
<div class="highlight">O rasgo veio \"de cima para baixo\" — ou seja, a iniciativa foi de Deus, não dos homens. O acesso à presença de Deus, antes restrito a um homem, um dia por ano, agora está aberto a todos, por meio de Cristo. \"Temos ousadia para entrar no Santo dos Santos pelo sangue de Jesus, pelo novo e vivo caminho que ele nos abriu através do véu\" (Hb 10:19–20).</div>`},

{ref:"João 19:34–36",icon:"🦴",tag:"TIPOLOGIA",title:"Nenhum osso quebrado — três profecias em um ato",
text:`<p>Os soldados romanos quebravam as pernas dos crucificados para acelerar a morte (crurifragium). Mas ao chegarem a Jesus, Ele já estava morto, e não lhe quebraram os ossos. Em vez disso, um soldado perfurou seu lado com uma lança, e saiu \"sangue e água\" (Jo 19:34).</p>
<p>João cita: \"Nenhum dos seus ossos será quebrado\" — cumprindo simultaneamente Êxodo 12:46 (o cordeiro pascal), Números 9:12, e Salmo 34:20.</p>
<div class="highlight">A saída de sangue e água é medicamente consistente com derrame pericárdico — líquido acumulado ao redor do coração, separando-se do sangue coagulado após a morte. O detalhe médico confirma que Jesus estava de fato morto, afastando qualquer teoria de \"desmaio\".</div>`},

{ref:"Atos 2:1–4",icon:"🔥",tag:"CONTEXTO",title:"Pentecostes — a Lei escrita no coração",
text:`<p>O derramamento do Espírito Santo acontece exatamente no dia de Pentecostes (<em>Shavuot</em>), a Festa das Semanas. No calendário judaico, esta festa celebrava dois eventos: a colheita do trigo e, mais importante, a entrega da Lei (Torah) no Monte Sinai.</p>
<p>A tradição rabínica ensinava que no Sinai a voz de Deus se dividiu em 70 línguas para que todas as nações ouvissem. Em Atos 2, os discípulos falam em diversas línguas, e pessoas de muitas nações ouvem em seus próprios idiomas.</p>
<div class="highlight">A conexão é teológica e proposital: no Sinai, Deus escreveu a Lei em tábuas de pedra. No Pentecostes, Deus escreve a Lei no coração pelo Espírito — exatamente como Jeremias havia profetizado: \"Porei a minha lei no seu interior e a escreverei no seu coração\" (Jr 31:33). O paralelo não é coincidência: é cumprimento.</div>`},

{ref:"Lucas 2:1–2",icon:"📋",tag:"ARQUEOLOGIA",title:"Censo de Quirino — confirmação romana",
text:`<p>Lucas registra que Jesus nasceu durante \"o primeiro recenseamento feito quando Quirino era governador da Síria\" (Lc 2:2). Críticos questionaram este dado por anos, até que inscrições romanas confirmaram que Quirino exerceu autoridade na Síria em dois períodos distintos.</p>
<p>Um papiro egípcio (P.Lond. 904) também confirma a prática romana de censos periódicos que exigiam retorno à cidade de origem — exatamente o que Lucas descreve com José indo a Belém.</p>
<div class="highlight">Lucas, que se apresenta como historiador cuidadoso (Lc 1:1–4), demonstra precisão em detalhes verificáveis — nomes de governadores, datas, práticas administrativas. Quando um autor é confiável nos detalhes que podemos verificar, isso fortalece a confiança nos relatos que não podemos.</div>`},

{ref:"Atos 18:12–17",icon:"🏛️",tag:"ARQUEOLOGIA",title:"Inscrição de Delfos — datando Paulo em Corinto",
text:`<p>Lucas menciona que Paulo foi levado perante Gálio, procônsul da Acaia, durante sua estadia em Corinto (At 18:12). Uma inscrição fragmentária encontrada em Delfos, na Grécia, menciona Gálio como procônsul durante o reinado de Cláudio, datando seu mandato por volta de 51–52 d.C.</p>
<div class="highlight">Esta inscrição é uma das âncoras cronológicas mais importantes do Novo Testamento. Ela permite datar a estadia de Paulo em Corinto — e, a partir daí, reconstruir toda a cronologia de suas viagens missionárias e epístolas. A precisão de Lucas como historiador é confirmada mais uma vez por evidência externa.</div>`},

{ref:"Mateus 28:11–15",icon:"🪦",tag:"EVIDÊNCIA",title:"O túmulo vazio — o argumento que ninguém contestou",
text:`<p>Após a ressurreição, os líderes judaicos subornaram os soldados para dizerem que os discípulos roubaram o corpo enquanto eles dormiam (Mt 28:11–15). Mateus observa que \"esta história se divulgou entre os judeus até o dia de hoje\".</p>
<p>Note o que esta narrativa revela: os opositores de Jesus nunca negaram que o túmulo estava vazio. Eles apenas propuseram uma explicação alternativa.</p>
<div class="highlight">Se o corpo ainda estivesse no túmulo, bastaria mostrá-lo para encerrar o cristianismo em seu nascimento. O fato de que mesmo os inimigos de Jesus admitiram o túmulo vazio — e precisaram inventar uma história para explicá-lo — é uma das evidências mais fortes da ressurreição. A disputa nunca foi \"o túmulo está vazio?\", mas sim \"por que está vazio?\".</div>`},

{ref:"1 Coríntios 15:3–8",icon:"👥",tag:"EVIDÊNCIA",title:"O credo mais antigo — testemunhas vivas",
text:`<p>Paulo cita aqui um credo que ele \"recebeu\" — linguagem técnica rabínica para transmissão formal de tradição. Estudiosos datam este credo entre 2 a 5 anos após a crucificação, tornando-o o registro mais antigo da fé cristã.</p>
<p>Paulo lista testemunhas da ressurreição: Pedro, os Doze, mais de 500 irmãos de uma vez (\"dos quais a maioria ainda vive\", diz Paulo, convidando à verificação), Tiago, todos os apóstolos, e o próprio Paulo.</p>
<div class="highlight">Quando Paulo escreve \"dos quais a maioria ainda vive\" (v.6), ele está essencialmente dizendo: \"Não confiem apenas na minha palavra — vão perguntar a eles.\" Este é o tipo de afirmação que ninguém faria se as testemunhas pudessem desmentir. A proximidade temporal e a abundância de testemunhas vivas distinguem a ressurreição de Cristo de qualquer lenda antiga.</div>`}
]
};

      <div class="cur-card open"><div class="cur-body" style="display:block">
        <p>Muitas pessoas usam \"hebreus\", \"israelitas\" e \"judeus\" como sinônimos — mas cada termo corresponde a um período e a um significado diferente. Entender essa distinção é essencial para acompanhar a narrativa bíblica.</p>

      <div class="cur-card${openCur===500?' open':''}">
        <div class="cur-head" onclick="togCur(500)">

          <div class="cur-ref">Hebreus — os peregrinos</div>

        <div class="cur-body">
          <p>O termo <strong>\"hebreu\"</strong> (em hebraico: <em>ivrí</em>) aparece pela primeira vez em Gênesis 14:13, referindo-se a <strong>\"Abrão, o hebreu\"</strong>. É o termo mais antigo dos três.</p>
          <p>A origem provável é do nome <strong>Éber</strong> (Gn 10:21), ancestral de Abraão na linhagem de Sem — ou do verbo hebraico <em>avar</em>, que significa \"atravessar\", \"cruzar\" — referência a Abraão ter atravessado o rio Eufrates ao sair de Ur.</p>
          <p>O termo é usado predominantemente no período patriarcal e no Êxodo. Os egípcios chamavam os descendentes de Abraão de \"hebreus\" — era um termo usado por <strong>outros povos</strong> para se referir a eles.</p>
          <div class="highlight">\"Então veio um que escapara e o contou a Abrão, o hebreu.\" — Gênesis 14:13</div>
          <p><strong>Período principal:</strong> De Abraão (~2000 a.C.) até o Êxodo (~1446 a.C.). No NT, Paulo se identifica como \"hebreu de hebreus\" (Fp 3:5), referindo-se à ancestralidade étnica e linguística.</p>

        <div class="cur-body">
          <p>O termo <strong>\"israelita\"</strong> vem de <strong>Israel</strong>, o nome dado por Deus a Jacó após lutar com o anjo em Peniel: <em>\"Não se chamará mais o teu nome Jacó, mas Israel; pois como príncipe lutaste com Deus e com os homens, e prevaleceste\"</em> (Gn 32:28).</p>
          <p>A palavra <em>Israel</em> significa provavelmente \"aquele que luta com Deus\" ou \"príncipe de Deus\".</p>
          <p>A partir de Jacó, seus 12 filhos formaram as <strong>12 tribos de Israel</strong>. O termo \"israelita\" designa qualquer membro dessas tribos — ou seja, todo o povo da aliança, da saída do Egito até a divisão e o exílio.</p>
          <div class="highlight">As 12 tribos descendem dos 12 filhos de Jacó: Rúben, Simeão, Levi, Judá, Dã, Naftali, Gade, Aser, Issacar, Zebulom, José (dividido em Efraim e Manassés) e Benjamim.</div>
          <p><strong>Período principal:</strong> Do Êxodo (~1446 a.C.) até o exílio babilônico (586 a.C.). Após a divisão do reino em 931 a.C., \"Israel\" passou a designar especificamente o <strong>Reino do Norte</strong> (10 tribos), enquanto o Sul era chamado de \"Judá\".</p>
          <p>Com a queda do Reino do Norte para a Assíria em 722 a.C., as 10 tribos foram dispersas e nunca retornaram como nação — são as chamadas \"tribos perdidas de Israel\".</p>

          <p>O termo <strong>\"judeu\"</strong> (em hebraico: <em>yehudí</em>) vem de <strong>Judá</strong>, a quarta tribo de Israel. Originalmente designava apenas os membros da tribo de Judá e do Reino do Sul.</p>
          <p>Após o exílio babilônico (586–538 a.C.), os que retornaram à terra eram predominantemente da tribo de Judá (com Benjamim e parte de Levi). Como as 10 tribos do norte já estavam dispersas, <strong>\"judeu\" passou a ser o termo genérico</strong> para todo o povo da aliança — independente da tribo original.</p>
          <p>No Novo Testamento, <strong>\"judeu\" é o termo padrão</strong>. Jesus é chamado \"Rei dos Judeus\" (Mt 27:37). Paulo se identifica como \"judeu, de Tarso\" (At 21:39). O Evangelho de João usa \"os judeus\" frequentemente para se referir às autoridades religiosas de Jerusalém.</p>
          <div class="highlight">A transição: Abraão era hebreu. Moisés liderou os israelitas. Jesus nasceu judeu. São o mesmo povo — mas cada termo reflete um período diferente da história da aliança de Deus com esse povo.</div>

          <p>No NT, esta promessa se cumpre: o Evangelho chega aos gentios. Pedro recebe a visão em Atos 10 e batiza Cornélio, o primeiro gentio convertido. Paulo se torna o \"apóstolo dos gentios\" (Rm 11:13) e leva o Evangelho por todo o mundo romano.</p>

          <p>A mensagem central é que <strong>em Cristo não há distinção</strong>: <em>\"Nisto não há judeu nem grego... porque todos vós sois um em Cristo Jesus\"</em> (Gl 3:28). A parede de separação foi derrubada (Ef 2:14).</p>

          <p>Jesus fez afirmações que nenhum mero \"bom mestre\" faria: perdoou pecados (prerrogativa exclusiva de Deus), disse \"Eu e o Pai somos um\" (Jo 10:30) e \"antes que Abraão existisse, EU SOU\" (Jo 8:58) — usando o nome divino revelado a Moisés.</p>

          <p>Não existe a opção \"apenas um bom professor\". Suas próprias palavras eliminam essa possibilidade.</p>

      <div class="cur-card${openCur===111?' open':''}">
        <div class="cur-head" onclick="togCur(111)">
          <span class="cur-icon">⚖️</span>
          <div class="cur-ref">O Argumento Moral — a lei que todos conhecem</div>
          <span class="cur-tag">FILOSOFIA</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>Lewis observou que todas as civilizações, em todas as épocas, possuem uma noção inata de certo e errado — mesmo quando discordam nos detalhes. Ninguém diz que trair quem confia em você é admirável. Nenhuma cultura celebra a covardia.</p>
          <p>Ele argumentou: se o universo é apenas matéria e energia sem propósito, de onde vem essa \"lei\" moral universal? Processos evolutivos explicam comportamento, mas não explicam a percepção de <em>obrigação</em> moral — o sentimento de que certas coisas <em>devem</em> ser feitas, quer nos beneficiem ou não.</p>
          <div class="highlight">Lewis escreveu: \"Se não existe inteligência por trás do universo, ninguém projetou meu cérebro para o propósito de pensar. Nesse caso, não tenho razão para confiar em meu cérebro quando ele me diz sobre o ateísmo. Se não existe Deus, não há razão para confiar em nenhum pensamento — incluindo o pensamento de que Deus não existe.\"</div>
        </div>
      </div>

      <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center;opacity:.4;margin:24px 0 10px">Josh McDowell — Evidência que Exige um Veredito</div>

      <div class="cur-card${openCur===112?' open':''}">
        <div class="cur-head" onclick="togCur(112)">
          <span class="cur-icon">💀</span>
          <div class="cur-ref">De covardes a mártires — a transformação impossível</div>
          <span class="cur-tag">EVIDÊNCIA</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>Josh McDowell era agnóstico e tentou refutar o cristianismo para humilhar amigos cristãos. Após anos de pesquisa, converteu-se e escreveu uma das obras apologéticas mais completas da história.</p>
          <p>McDowell destaca a transformação radical dos discípulos como uma das evidências mais poderosas. Na noite da prisão de Jesus, todos fugiram. Pedro negou três vezes. Eles se trancaram em um quarto por medo.</p>
          <p>Semanas depois, esses mesmos homens pregavam publicamente a ressurreição diante das autoridades que haviam executado Jesus — e aceitavam prisão, tortura e morte por isso.</p>
          <div class="highlight">McDowell argumenta: \"Pessoas morrem por algo que acreditam ser verdade, mas não por algo que sabem ser mentira. Se os discípulos inventaram a ressurreição, eles saberiam que era mentira. Nenhuma teoria psicológica explica por que doze homens aceitariam morrer — separadamente, em momentos e locais diferentes — por uma mentira que eles mesmos criaram, sem que nenhum jamais se retratasse.\"</div>
        </div>
      </div>

      <div class="cur-card${openCur===113?' open':''}">
        <div class="cur-head" onclick="togCur(113)">
          <span class="cur-icon">📝</span>
          <div class="cur-ref">O critério do embaraço — por que inventores não escreveriam assim</div>
          <span class="cur-tag">MANUSCRITOS</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>McDowell observa que os Evangelhos contêm uma quantidade surpreendente de material constrangedor para os próprios autores e para os heróis da fé — algo que inventores nunca incluiriam.</p>
          <p>Pedro, o líder, é chamado de \"Satanás\" por Jesus (Mc 8:33) e nega o Mestre três vezes. Os discípulos falham repetidamente em entender os ensinamentos. As primeiras testemunhas da ressurreição são mulheres — cujo testemunho não tinha valor legal no judaísmo do século I. Tiago, irmão de Jesus, é descrito como incrédulo durante o ministério.</p>
          <div class="highlight">Em historiografia, o \"critério do embaraço\" é uma ferramenta reconhecida: se um autor inclui algo que prejudica sua própria causa, a probabilidade de ser verdade aumenta enormemente. Ninguém inventa uma mentira e a preenche com detalhes que enfraquecem sua credibilidade. Os Evangelhos leem como testemunho honesto — não como propaganda.</div>
        </div>
      </div>

      <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center;opacity:.4;margin:24px 0 10px">Geisler & Turek — Não Tenho Fé Suficiente para Ser Ateu</div>

      <div class="cur-card${openCur===114?' open':''}">
        <div class="cur-head" onclick="togCur(114)">
          <span class="cur-icon">🎯</span>
          <div class="cur-ref">O ajuste fino do universo — precisão impossível</div>
          <span class="cur-tag">CIÊNCIA</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>Norman Geisler e Frank Turek apresentam o argumento do ajuste fino: as constantes fundamentais do universo (força gravitacional, força nuclear forte, taxa de expansão do universo, etc.) estão calibradas com uma precisão absurda para permitir a existência de vida.</p>
          <p>Se a força gravitacional fosse alterada em 1 parte em 10<sup>40</sup>, estrelas não se formariam. Se a força nuclear forte variasse 2%, não haveria átomos. A taxa de expansão do universo é precisa em 1 parte em 10<sup>55</sup>.</p>
          <div class="highlight">Turek ilustra: \"Imagine um painel de controle com dezenas de botões giratórios, cada um podendo ser ajustado entre bilhões de posições. Todos estão na posição exata para permitir vida. O ateísmo nos pede para acreditar que cada botão girou para a posição certa por acaso. A fé no acaso cósmico requer muito mais credulidade do que a fé em um Criador inteligente.\"</div>
        </div>
      </div>

      <div class="cur-card${openCur===115?' open':''}">
        <div class="cur-head" onclick="togCur(115)">
          <span class="cur-icon">💥</span>
          <div class="cur-ref">O universo teve um início — e isso muda tudo</div>
          <span class="cur-tag">COSMOLOGIA</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>Geisler e Turek argumentam a partir da ciência moderna: o Big Bang demonstra que o universo teve um início. Tudo o que começa a existir tem uma causa. O universo começou a existir. Portanto, o universo tem uma causa.</p>
          <p>Essa causa precisa ser exterior ao universo (transcendente), anterior ao tempo (eterna), imaterial (pois a matéria foi criada), e inimaginavelmente poderosa.</p>
          <div class="highlight">Turek observa: \"Ateus como Bertrand Russell diziam 'o universo simplesmente existe'. Mas a ciência refutou isso — o universo não é eterno, ele começou. Ironicamente, a ciência que muitos usam contra Deus acabou confirmando exatamente o que Gênesis 1:1 diz há 3.400 anos: 'No princípio, Deus criou os céus e a terra.'\"</div>
        </div>

      <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center;opacity:.4;margin:24px 0 10px">William Lane Craig — Em Guarda</div>

      <div class="cur-card${openCur===116?' open':''}">

          <span class="cur-icon">🧠</span>

          <span class="cur-tag">FILOSOFIA</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>William Lane Craig, considerado um dos maiores filósofos cristãos vivos, formalizou o Argumento Cosmológico Kalam em três premissas simples:</p>
          <p><strong>1.</strong> Tudo que começa a existir tem uma causa.<br>
          <strong>2.</strong> O universo começou a existir.<br>
          <strong>3.</strong> Portanto, o universo tem uma causa.</p>
          <p>A premissa 1 nunca foi refutada — nada surge do nada sem causa. A premissa 2 é confirmada pela expansão do universo, pela radiação cósmica de fundo, e pela segunda lei da termodinâmica (o universo está se esgotando, logo não pode ser eterno).</p>
          <div class="highlight">Craig argumenta: \"A causa do universo precisa ser não-causada, eterna, imaterial, pessoal e incrivelmente poderosa. Pessoal porque escolheu criar — uma causa impessoal eterna produziria um efeito eterno, não um início temporal. Isso se parece muito com o que os teístas sempre chamaram de 'Deus'.\"</div>
        </div>
      </div>

      <div class="cur-card${openCur===117?' open':''}">
        <div class="cur-head" onclick="togCur(117)">
          <span class="cur-icon">🗣️</span>
          <div class="cur-ref">\"Se Deus não existe, valores morais objetivos não existem\"</div>
          <span class="cur-tag">MORAL</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>Craig apresenta o argumento moral de forma contundente: se não existe Deus, não existe fundamento objetivo para a moralidade. Sem um legislador transcendente, \"certo\" e \"errado\" são apenas preferências culturais — como preferir chocolate a baunilha.</p>
          <p>Mas nós sabemos que o Holocausto foi objetivamente errado — não apenas \"culturalmente desaprovado\". Torturar crianças por diversão não é apenas impopular — é mau. Essa percepção de mal objetivo exige um padrão objetivo de bem.</p>
          <div class="highlight">Craig afirma: \"Se alguém realmente acredita que sem Deus não há diferença moral entre amar uma criança e torturá-la, então algo está profundamente errado — não com o argumento, mas com a pessoa. Nossa percepção moral aponta para uma realidade moral que transcende a opinião humana. E uma lei moral transcendente requer um legislador moral transcendente.\"</div>
        </div>
      </div>

      <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center;opacity:.4;margin:24px 0 10px">Gary Habermas — A Ressurreição como Fato Histórico</div>

      <div class="cur-card${openCur===118?' open':''}">
        <div class="cur-head" onclick="togCur(118)">
          <span class="cur-icon">📊</span>
          <div class="cur-ref">O Método dos Fatos Mínimos — o que até céticos aceitam</div>
          <span class="cur-tag">HISTÓRIA</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>Gary Habermas é a maior autoridade mundial em evidências históricas da ressurreição. Ele analisou mais de 3.400 publicações acadêmicas (de autores cristãos, agnósticos e ateus) sobre o Jesus histórico e identificou fatos aceitos pela esmagadora maioria dos historiadores:</p>
          <p><strong>1.</strong> Jesus morreu por crucificação.<br>
          <strong>2.</strong> Os discípulos acreditaram ter visto Jesus ressuscitado.<br>
          <strong>3.</strong> O perseguidor Paulo se converteu após relatar um encontro com o Cristo ressurreto.<br>
          <strong>4.</strong> O cético Tiago (meio-irmão de Jesus) se converteu após relatar uma aparição.<br>
          <strong>5.</strong> O túmulo estava vazio.</p>
          <div class="highlight">Habermas argumenta: \"Estes fatos são aceitos por aproximadamente 75% dos estudiosos que publicam sobre o tema — incluindo céticos, agnósticos e ateus. Não estou pedindo que aceitem a Bíblia como Palavra de Deus. Estou usando apenas o que os próprios críticos admitem, e mostrando que a ressurreição é a única explicação que dá conta de todos esses fatos simultaneamente.\"</div>
        </div>
      </div>

      <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center;opacity:.4;margin:24px 0 10px">F.F. Bruce — São Fidedignos os Documentos do NT?</div>

      <div class="cur-card${openCur===119?' open':''}">
        <div class="cur-head" onclick="togCur(119)">
          <span class="cur-icon">🏺</span>
          <div class="cur-ref">Os Evangelhos como testemunho ocular</div>
          <span class="cur-tag">MANUSCRITOS</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>F.F. Bruce foi professor de Crítica e Exegese Bíblica na Universidade de Manchester e um dos maiores especialistas em manuscritos do Novo Testamento do século XX.</p>
          <p>Bruce demonstrou que os Evangelhos passam nos três testes clássicos de historiografia: o <strong>teste bibliográfico</strong> (quantidade e antiguidade dos manuscritos), o <strong>teste da evidência interna</strong> (os autores são confiáveis?) e o <strong>teste da evidência externa</strong> (outros autores antigos confirmam?).</p>
          <p>Escritores pagãos como Tácito, Plínio o Jovem, Josefo e Suetônio mencionam Jesus, os cristãos e eventos descritos no NT — sem nenhuma motivação para favorecer o cristianismo.</p>
          <div class="highlight">Bruce escreveu: \"Se o Novo Testamento fosse uma coleção de escritos seculares, sua autenticidade seria considerada acima de qualquer dúvida. É curioso que o padrão de prova exigido para os textos bíblicos seja tão mais rigoroso do que o aplicado a qualquer outro documento da antiguidade. Se aplicássemos aos clássicos o mesmo ceticismo, não teríamos certeza de praticamente nada sobre o mundo antigo.\"</div>
        </div>
      </div>

      <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;letter-spacing:2px;text-transform:uppercase;text-align:center;opacity:.4;margin:24px 0 10px">A Coerência Interna da Bíblia</div>

      <div class="cur-card${openCur===107?' open':''}">
        <div class="cur-head" onclick="togCur(107)">
          <span class="cur-icon">🌈</span>
          <div class="cur-ref">63.779 conexões — o \"arco-íris\" da Bíblia</div>
          <span class="cur-tag">VISUALIZAÇÃO</span>
          <span class="cur-arr">▼</span>
        </div>
        <div class="cur-body">
          <p>Em 2007, o professor <strong>Chris Harrison</strong> (Carnegie Mellon University), em colaboração com o Pastor Christoph Römhild, criou uma das visualizações de dados mais impactantes da história: um diagrama de arco que mapeia todas as <strong>63.779 referências cruzadas</strong> encontradas na Bíblia.</p>
          <p>Na base do gráfico, cada barra representa um capítulo da Bíblia (de Gênesis a Apocalipse). Cada arco conecta dois capítulos que se referenciam mutuamente. A cor de cada arco varia conforme a distância entre os capítulos — criando o icônico efeito visual de arco-íris.</p>
          <div class="highlight">O resultado visual é impressionante: uma teia densa e multicolorida que revela o nível extraordinário de interconexão da Bíblia. São 66 livros, escritos por cerca de 40 autores, ao longo de aproximadamente 1.500 anos, em 3 idiomas, em 3 continentes — e mesmo assim formam uma narrativa unificada com milhares de conexões internas.</div>
          <p>Jordan Peterson incluiu esta visualização em suas palestras, descrevendo a Bíblia como \"possivelmente o primeiro livro com hiperlinks\" — cada referência cruzada funciona como um link que conecta uma parte do texto a outra, formando uma rede coerente.</p>
          <p style="margin-top:12px"><strong>Veja a visualização completa:</strong><br>
          <a href="https://www.chrisharrison.net/index.php/visualizations/BibleViz" target="_blank" style="color:#6a4a2a;font-weight:700">chrisharrison.net/BibleViz</a></p>
          <div class="source">© Chris Harrison / Carnegie Mellon University</div>
        </div>
      </div>

      <div class="cur-card${openCur===108?' open':''}">

          <span class="cur-tag">COERÊNCIA</span>

        <div class="cur-body">
          <p>A Bíblia foi escrita por aproximadamente 40 autores de origens radicalmente diferentes: pastores (Amós), reis (Davi, Salomão), médicos (Lucas), pescadores (Pedro, João), um cobrador de impostos (Mateus), um fariseu erudito (Paulo), um copeiro (Neemias), um general (Josué), e um criador de gado e agricultor (Moisés antes do chamado).</p>
          <p>Esses autores escreveram em três idiomas (hebraico, aramaico, grego), em três continentes (Ásia, África, Europa), ao longo de pelo menos 1.500 anos — muitos sem conhecer uns aos outros ou ter acesso aos textos dos demais.</p>
          <div class="highlight">Apesar dessa diversidade extrema, a Bíblia apresenta uma narrativa coerente do início ao fim: criação, queda, promessa de redenção, cumprimento em Cristo, e restauração final. Temas como sacrifício, aliança, redenção e reino permeiam todo o texto. Nenhum outro livro na história da humanidade foi composto de forma similar e manteve tal unidade.</div>
        </div>
      </div>

  try{

}
function toggleAll365(from,to,markDone){
  for(let d=from;d<=to;d++){if(markDone)ck365[d]=true;else delete ck365[d]}
  sv365();render();
}
function showReset(){
  const modeLabel=mode==='prog'?'Progressivo':'Plano Diário';
  const box=document.getElementById('backupBox');
  box.innerHTML=`<h3>🗑️ Zerar Progresso</h3><p style="font-size:15px;margin:12px 0">Tem certeza que deseja zerar todo o progresso do modo <strong>${modeLabel}</strong>?</p><p style="font-size:13px;opacity:.6;margin-bottom:16px">Esta ação não pode ser desfeita. Considere exportar seu progresso antes.</p><button onclick="doReset()" style="background:#8a2a2a;border-color:#8a2a2a">Sim, zerar</button><button class="btn-secondary" onclick="closeBackup()">Cancelar</button>`;
  document.getElementById('backupModal').classList.add('show');
}
function doReset(){
  if(mode==='prog'){ckProg={};svProg()}else{ck365={};sv365();startDate=new Date().toISOString().slice(0,10);try{localStorage.setItem('bc365Start',startDate)}catch(e){}}
  closeBackup();render();
}

function render(){
const c=document.getElementById('main');c.innerHTML='';
if(mode==='prog') renderProg(c); else render365(c);
}

function renderProg(c){
let lastT='';
let totalItems=0,doneItems=0;
PROG.forEach(ph=>{totalItems+=ph.items.length;ph.items.forEach((_,i)=>{if(ckProg[ph.id+'-'+i])doneItems++})});
updProgress(doneItems,totalItems);

PROG.forEach(ph=>{
  if(ph.testament!==lastT){lastT=ph.testament;const lb=document.createElement('div');lb.className='testament-label';lb.textContent=ph.testament==='AT'?'── Antigo Testamento ──':'── Novo Testamento ──';c.appendChild(lb)}
  const isO=opProg===ph.id;
  const pD=ph.items.filter((_,i)=>ckProg[ph.id+'-'+i]).length;
  const allDone=pD===ph.items.length;
  const meta=SEC_META[ph.id];
  const div=document.createElement('div');div.className='sec'+(isO?' open':'');
  let bl='';
  // Context bar with note + select all
  const ctxText=meta&&meta.ctx?`<span class="ctx-note-inline">💡 ${meta.ctx}</span>`:'';
  const selLabel=allDone?'✅ Tudo lido':'☑️ Marcar tudo';
  bl+=`<div class="ctx-bar">${ctxText}<button class="sel-all-btn" onclick="event.stopPropagation();toggleAllProg(${ph.id},${!allDone})">${selLabel}</button></div>`;
  ph.items.forEach((b,i)=>{const k=ph.id+'-'+i;const dn=ckProg[k];bl+=`<div class="item${dn?' done':''}" style="--pc:${ph.color}" onclick="chkProg('${k}')"><div class="ichk">${dn?'✓':''}</div><div><div class="iref"><span class="inum">${i+1}</span>${b.r}</div><div class="itop">${b.t}</div></div></div>`});
  // Completion banner
  if(allDone&&meta) bl+=`<div class="completion"><div class="comp-icon">✅</div><div class="comp-title">Seção concluída!</div><div class="comp-verse">\"${meta.verse}\"</div><div class="comp-ref">— ${meta.ref}</div><div style="font-size:13px;opacity:.6;margin-top:8px;font-style:italic">${meta.note}</div></div>`;
  div.innerHTML=`<button class="sbtn" style="${isO?`background:linear-gradient(135deg,${ph.color},${ph.color}dd);color:#f5f0e8;border:none;box-shadow:0 2px 12px rgba(0,0,0,.15)`:''}" onclick="togProg(${ph.id})"><span class="sicon">${ph.icon}</span><div class="sinfo"><div class="stitle">${allDone?'✅ ':''} ${ph.id}. ${ph.title}</div><div class="sper">${ph.period} · ${ph.items.length} leituras${pD>0?` (${pD}/${ph.items.length} ✓)`:''}</div></div><span class="sarr">▼</span></button><div class="ilist" style="border-top:3px solid ${ph.accent}">${bl}</div>`;
  c.appendChild(div);
})}

function render365(c){
let lastT='';const td=todayDay();
let totalItems=D365.length,doneItems=Object.values(ck365).filter(Boolean).length;
updProgress(doneItems,totalItems);

D365_SECTIONS.forEach(sec=>{
  if(sec.test!==lastT){lastT=sec.test;const lb=document.createElement('div');lb.className='testament-label';lb.textContent=sec.test==='AT'?'── Antigo Testamento ──':'── Novo Testamento ──';c.appendChild(lb)}
  const isO=op365===sec.from;
  const days=D365.filter(x=>x.d>=sec.from&&x.d<=sec.to);
  const secDone=days.filter(x=>ck365[x.d]).length;
  const allDone=secDone===days.length;
  const meta=D365_META[sec.from];
  const div=document.createElement('div');div.className='sec'+(isO?' open':'');
  let bl='';
  // Context bar with note + select all
  const ctxText=meta&&meta.ctx?`<span class="ctx-note-inline">💡 ${meta.ctx}</span>`:'';
  const selLabel=allDone?'✅ Tudo lido':'☑️ Marcar tudo';
  bl+=`<div class="ctx-bar">${ctxText}<button class="sel-all-btn" onclick="event.stopPropagation();toggleAll365(${sec.from},${sec.to},${!allDone})">${selLabel}</button></div>`;
  days.forEach(day=>{const dn=ck365[day.d];const isT=day.d===td;bl+=`<div class="item${dn?' done':''}" id="d365-${day.d}" style="--pc:${sec.color}${isT?';border-left:3px solid #b8860b':''}" onclick="chk365(${day.d})"><div class="ichk">${dn?'✓':''}</div><div><div class="iref"><span class="inum">${day.d}</span>${day.r}</div><div class="itop">${day.t}</div></div></div>`});
  // Completion banner
  if(allDone&&meta) bl+=`<div class="completion"><div class="comp-icon">✅</div><div class="comp-title">Seção concluída!</div><div class="comp-verse">\"${meta.verse}\"</div><div class="comp-ref">— ${meta.ref}</div><div style="font-size:13px;opacity:.6;margin-top:8px;font-style:italic">${meta.note}</div></div>`;
  div.innerHTML=`<button class="sbtn" style="${isO?`background:linear-gradient(135deg,${sec.color},${sec.color}dd);color:#f5f0e8;border:none;box-shadow:0 2px 12px rgba(0,0,0,.15)`:''}" onclick="tog365(${sec.from})"><span class="sicon">${sec.icon}</span><div class="sinfo"><div class="stitle">${allDone?'✅ ':''}${sec.title}</div><div class="sper">Dias ${sec.from}–${sec.to} · ${days.length} leituras${secDone>0?` (${secDone}/${days.length} ✓)`:''}</div></div><span class="sarr">▼</span></button><div class="ilist" style="border-top:3px solid ${sec.accent}">${bl}</div>`;
  c.appendChild(div);
})}

function updProgress(done,total){
const pc=Math.round((done/total)*100);
document.getElementById('pt').textContent=`${done}/${total} ${mode==='prog'?'leituras':'dias'} — ${pc}%`;
document.getElementById('pf').style.width=pc+'%';
}

rVB();rFT();render();
</script>
</body>
</html>
