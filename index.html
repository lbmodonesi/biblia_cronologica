{r:"1 Pedro 1–2",t:"Esperança viva, pedras vivas, sacerdócio real"},
{r:"1 Pedro 3–5",t:"Sofrimento por Cristo, pastorear o rebanho"},
{r:"2 Pedro 1–3",t:"Crescimento na fé, falsos mestres, dia do Senhor"},
{r:"Judas 1",t:"Contenda pela fé, falsos mestres, doxologia"},
{r:"1 João 1–3",t:"Deus é luz, propiciação, filhos de Deus"},
{r:"1 João 4–5",t:"\"Deus é amor\", fé que vence o mundo"},
{r:"2 João 1",t:"Andar na verdade e no amor"},
{r:"3 João 1",t:"Gaio, Diótrefes, Demétrio"},
]},

{testament:"NT",id:21,title:"Consumação — Apocalipse",period:"c. 95 d.C.",color:"#1a1a2e",accent:"#e0c97f",icon:"🌟",items:[
{r:"Apocalipse 1",t:"Visão do Cristo glorificado"},
{r:"Apocalipse 2–3",t:"Cartas às sete igrejas da Ásia"},
{r:"Apocalipse 4–5",t:"Trono celestial, o Cordeiro digno de abrir o livro"},
{r:"Apocalipse 6–7",t:"Seis selos, 144 mil selados"},
{r:"Apocalipse 8–9",t:"Sétimo selo, seis trombetas"},
{r:"Apocalipse 10–11",t:"Anjo forte, livrinho, duas testemunhas, sétima trombeta"},
{r:"Apocalipse 12–14",t:"Mulher e dragão, bestas, Cordeiro no Sião, ceifa"},
{r:"Apocalipse 15–16",t:"Sete taças da ira de Deus"},
{r:"Apocalipse 17–18",t:"Queda da grande Babilônia"},
{r:"Apocalipse 19–20",t:"Bodas do Cordeiro, volta de Cristo, milênio, juízo final"},
{r:"Apocalipse 21–22",t:"Novo céu e nova terra, Nova Jerusalém, \"Vem, Senhor Jesus!\""},

];

let cv='ARC',op=null,ck={};
try{const s=localStorage.getItem('bc2');if(s)ck=JSON.parse(s)}catch(e){}
function sv(){try{localStorage.setItem('bc2',JSON.stringify(ck))}catch(e){}}

function setV(v){cv=v;document.querySelectorAll('.tog button').forEach((b,i)=>{b.classList.toggle('on',(i===0&&v==='ARC')||(i===1&&v==='ARA'))});rVB();rFT()}
function rVB(){const v=VS[cv];document.getElementById('vb').innerHTML=`<strong>${v.f} (${cv})</strong><br><span class="p2">${v.p}</span><br><em>${v.n}</em>`}
function rFT(){const v=VS[cv];document.getElementById('ft').innerHTML=`Roteiro cronológico completo — ${v.f} (${cv})<br>Ordem cronológica aproximada conforme consenso acadêmico-conservador<br><br>Desenvolvido por <strong>Lucas Modonesi</strong> · <a href="https://instagram.com/lbmodonesi" target="_blank">@lbmodonesi</a> · com auxílio de Claude (Anthropic)`}

function uP(){
const t=DATA.reduce((s,p)=>s+p.items.length,0);
const d=Object.values(ck).filter(Boolean).length;
const pc=Math.round((d/t)*100);
document.getElementById('pt').textContent=`${d}/${t} leituras — ${pc}%`;
document.getElementById('pf').style.width=pc+'%';
}

function togP(id){op=op===id?null:id;render()}
function togB(k){ck[k]=!ck[k];sv();render()}
function resetAll(){if(confirm('Zerar todo o progresso de leitura?')){ck={};sv();render()}}

function render(){
const c=document.getElementById('main');c.innerHTML='';
let lastT='';
DATA.forEach(ph=>{
  if(ph.testament!==lastT){
    lastT=ph.testament;
    const lb=document.createElement('div');
    lb.className='testament-label';
    lb.textContent=ph.testament==='AT'?'── Antigo Testamento ──':'── Novo Testamento ──';
    c.appendChild(lb);
  }
  const isO=op===ph.id;
  const pD=ph.items.filter((_,i)=>ck[`${ph.id}-${i}`]).length;
  const div=document.createElement('div');
  div.className='phase'+(isO?' open':'');
  let bl='';
  ph.items.forEach((b,i)=>{
    const k=`${ph.id}-${i}`;
    const dn=ck[k];
    bl+=`<div class="bitem${dn?' done':''}" style="--pc:${ph.color}" onclick="togB('${k}')">
<div class="bchk">${dn?'✓':''}</div>
<div><div class="bref"><span class="bnum">${i+1}.</span>${b.r}</div><div class="btop">${b.t}</div></div></div>`;
  });
  div.innerHTML=`<button class="pbtn" style="${isO?`background:linear-gradient(135deg,${ph.color},${ph.color}dd);color:#f5f0e8;border:none;box-shadow:0 2px 12px rgba(0,0,0,.15)`:''}" onclick="togP(${ph.id})">
<span class="picon">${ph.icon}</span>
<div class="pinfo"><div class="ptitle">${ph.id}. ${ph.title}</div><div class="pper">${ph.period} · ${ph.items.length} leituras${pD>0?` (${pD}/${ph.items.length} ✓)`:''}</div></div>
<span class="parr">▼</span></button>
<div class="blist" style="border-top:3px solid ${ph.accent}">${bl}</div>`;
  c.appendChild(div);
});
uP();
}
rVB();rFT();render();
</script>
